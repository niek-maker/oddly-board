<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddly Board — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8ff00;
      --danger: #ff4d4d;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .login-box h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
    .login-box .sub { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

    .login-input-wrap {
      display: flex;
      gap: 0.5rem;
    }

    .login-input-wrap input {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
    }

    .login-input-wrap input:focus { border-color: var(--accent); }

    .login-input-wrap button, .btn {
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: #555; color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }

    .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

    /* ADMIN LAYOUT */
    .admin-screen { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .topbar h1 { font-size: 1.3rem; font-weight: 700; }
    .topbar-actions { display: flex; gap: 0.75rem; }
    .topbar-actions a, .topbar-actions button {
      color: var(--text-muted);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topbar-actions a:hover, .topbar-actions button:hover { color: var(--text); border-color: #444; }

    .admin-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ADD FORM */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .add-form h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.2rem;
    }

    .platform-preview {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent-dim, #c8ff0022);
      color: var(--accent);
      margin-top: 0.3rem;
    }

    /* ITEMS LIST */
    .items-section h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .item-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }

    .item-row:hover { border-color: #3a3a3a; }

    .item-info { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 0.95rem; }
    .item-url {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-platform {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .item-actions button {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .item-actions button:hover { color: var(--text); border-color: #555; }
    .item-actions button.delete:hover { color: var(--danger); border-color: var(--danger); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #000;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .admin-content { padding: 1rem; }
      .topbar { padding: 1rem; }
      .item-row { flex-direction: column; align-items: flex-start; }
      .item-actions { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>Oddly<span style="color:var(--accent)">.</span>Board</h1>
      <p class="sub">Admin access required</p>
      <div class="login-input-wrap">
        <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="off">
        <button class="btn" onclick="attemptLogin()">Enter</button>
      </div>
      <p class="login-error" id="loginError">Wrong password.</p>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-screen" id="adminScreen">
    <div class="topbar">
      <h1>Admin</h1>
      <div class="topbar-actions">
        <a href="index.html">View Board</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="admin-content">

      <!-- ADD FORM -->
      <div class="add-form">
        <h2 id="formTitle">Add new item</h2>

        <div class="form-group">
          <label>URL (Instagram, YouTube, TikTok, or any link)</label>
          <input type="url" id="inputUrl" placeholder="https://www.instagram.com/reel/..." oninput="detectPlatform()">
          <span class="platform-preview" id="platformPreview" style="display:none"></span>
        </div>

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="inputTitle" placeholder="Give it a name">
        </div>

        <div class="form-group">
          <label>Description (optional)</label>
          <textarea id="inputDesc" placeholder="Short note about this item..."></textarea>
        </div>

        <div class="form-actions">
          <button class="btn" onclick="saveItem()">Save</button>
          <button class="btn btn-outline" onclick="clearForm()">Cancel</button>
        </div>
      </div>

      <!-- ITEMS LIST -->
      <div class="items-section">
        <h2>All items <span class="item-count" id="itemCount"></span></h2>
        <div id="itemsList"></div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================
    // CONFIG — Same as index.html
    // ============================================
    const SUPABASE_URL = 'https://lwtutcgfpiztdieowahf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHV0Y2dmcGl6dGRpZW93YWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTU5OTcsImV4cCI6MjA4ODA3MTk5N30.hocUS10WimBr9GfaR4hu96yRX0OYawiBsSQ0Usf3jpM';
    const ADMIN_PASSWORD = 'oddlyadmin2024';
    // ============================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editingId = null;

    // --- AUTH ---
    function attemptLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('oddly_admin', 'true');
        sessionStorage.setItem('oddly_auth', 'true');
        showAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function showAdmin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadItems();
    }

    if (sessionStorage.getItem('oddly_admin')) {
      showAdmin();
    }

    // --- PLATFORM DETECTION ---
    function detectPlatform() {
      const url = document.getElementById('inputUrl').value;
      const preview = document.getElementById('platformPreview');
      const platform = getPlatform(url);

      if (platform) {
        preview.textContent = platform;
        preview.style.display = 'inline-block';
      } else {
        preview.style.display = 'none';
      }
    }

    function getPlatform(url) {
      if (!url) return null;
      if (url.includes('instagram.com')) return 'instagram';
      if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
      if (url.includes('tiktok.com')) return 'tiktok';
      if (url.includes('vimeo.com')) return 'vimeo';
      return 'other';
    }

    // --- CRUD ---
    async function loadItems() {
      const { data, error } = await supabase
        .from('items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const items = data || [];
      document.getElementById('itemCount').textContent = `(${items.length})`;

      if (items.length === 0) {
        document.getElementById('itemsList').innerHTML =
          '<p style="color:var(--text-muted);text-align:center;padding:2rem">No items yet. Add your first one above!</p>';
        return;
      }

      document.getElementById('itemsList').innerHTML = items.map(item => `
        <div class="item-row">
          <div class="item-info">
            <div class="item-title">${escapeHtml(item.title)}</div>
            <div class="item-url">${escapeHtml(item.url)}</div>
          </div>
          <span class="item-platform">${item.platform || 'link'}</span>
          <div class="item-actions">
            <button onclick="editItem('${item.id}')">Edit</button>
            <button class="delete" onclick="deleteItem('${item.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function saveItem() {
      const url = document.getElementById('inputUrl').value.trim();
      const title = document.getElementById('inputTitle').value.trim();
      const description = document.getElementById('inputDesc').value.trim();
      const platform = getPlatform(url);

      if (!url || !title) {
        showToast('URL and title are required');
        return;
      }

      const itemData = { url, title, description, platform };

      let error;
      if (editingId) {
        ({ error } = await supabase.from('items').update(itemData).eq('id', editingId));
      } else {
        ({ error } = await supabase.from('items').insert([itemData]));
      }

      if (error) {
        console.error(error);
        showToast('Error saving item');
        return;
      }

      showToast(editingId ? 'Item updated!' : 'Item added!');
      clearForm();
      loadItems();
    }

    async function editItem(id) {
      const { data } = await supabase.from('items').select('*').eq('id', id).single();
      if (!data) return;

      editingId = id;
      document.getElementById('inputUrl').value = data.url;
      document.getElementById('inputTitle').value = data.title;
      document.getElementById('inputDesc').value = data.description || '';
      document.getElementById('formTitle').textContent = 'Edit item';
      detectPlatform();

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteItem(id) {
      if (!confirm('Delete this item?')) return;

      const { error } = await supabase.from('items').delete().eq('id', id);
      if (error) {
        showToast('Error deleting');
        return;
      }
      showToast('Deleted');
      loadItems();
    }

    function clearForm() {
      editingId = null;
      document.getElementById('inputUrl').value = '';
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputDesc').value = '';
      document.getElementById('platformPreview').style.display = 'none';
      document.getElementById('formTitle').textContent = 'Add new item';
    }

    // --- UTILS ---
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
