<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddly Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8ff00;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .login-box { text-align: center; max-width: 360px; width: 100%; }
    .login-box h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
    .login-box .accent { color: var(--accent); }
    .login-box p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .login-input-wrap { display: flex; gap: 0.5rem; }
    .login-input-wrap input {
      flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none;
    }
    .login-input-wrap input:focus { border-color: var(--accent); }
    .login-input-wrap button {
      padding: 0.85rem 1.5rem; border: none; border-radius: 10px; background: var(--accent);
      color: #000; font-family: inherit; font-weight: 600; font-size: 0.95rem; cursor: pointer;
    }
    .login-input-wrap button:hover { opacity: 0.85; }
    .login-error { color: #ff4d4d; font-size: 0.85rem; margin-top: 0.75rem; display: none; }

    /* BOARD */
    .board-screen { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .topbar h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }
    .topbar-actions a, .topbar-actions button {
      color: var(--text-muted); text-decoration: none; font-family: inherit; font-size: 0.85rem;
      background: var(--surface); border: 1px solid var(--border); padding: 0.5rem 1rem;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .topbar-actions a:hover, .topbar-actions button:hover { color: var(--text); border-color: #444; }

    /* FILTERS */
    .filter-bar {
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
      position: sticky; top: 56px; background: var(--bg); z-index: 99;
    }
    .filter-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 0.25rem; }
    .filter-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.85rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
    }
    .filter-pill:hover { border-color: #555; color: var(--text); }
    .filter-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .filter-pill.active:hover { opacity: 0.85; }
    .filter-divider { width: 1px; height: 24px; background: var(--border); margin: 0 0.25rem; }
    .tag-filter {
      padding: 0.3rem 0.7rem; border-radius: 16px; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
      opacity: 0.5;
    }
    .tag-filter:hover { opacity: 0.8; }
    .tag-filter.active { opacity: 1; border-color: rgba(255,255,255,0.3); }

    /* BOARD CONTENT */
    .board-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    .category { margin-bottom: 3rem; }
    .category-title {
      font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 1.5rem; padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent); display: inline-block;
    }

    .subcategory { margin-bottom: 2rem; margin-left: 0.5rem; }
    .subcategory-title {
      font-size: 1.1rem; font-weight: 600; color: var(--text-muted);
      margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* 1:1 GRID */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); border-color: #3a3a3a; }

    /* Card inner content fills 1:1 */
    .card-embed {
      width: 100%; height: 100%; background: #000;
      position: absolute; inset: 0;
    }
    .card-embed iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

    .card-text {
      padding: 1.2rem; font-size: 0.9rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; overflow: hidden;
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }

    .card-image {
      position: absolute; inset: 0;
    }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 1rem; pointer-events: none;
    }
    .card-overlay-title { font-weight: 600; font-size: 0.85rem; }
    .card-overlay-tags { display: flex; gap: 0.3rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .card-overlay-tags .card-tag {
      font-size: 0.6rem; padding: 0.1rem 0.45rem; border-radius: 8px; font-weight: 600;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300;
      display: none; align-items: center; justify-content: center; padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none;
      color: #fff; font-size: 2rem; cursor: pointer; z-index: 310; opacity: 0.7;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-content {
      max-width: 800px; width: 100%; max-height: 90vh; border-radius: 16px;
      overflow: hidden; background: var(--surface); border: 1px solid var(--border);
    }
    .lightbox-media {
      width: 100%; background: #000;
    }
    .lightbox-media iframe { width: 100%; aspect-ratio: 9/16; max-height: 70vh; border: none; }
    .lightbox-media.landscape iframe { aspect-ratio: 16/9; }
    .lightbox-media img { width: 100%; max-height: 70vh; object-fit: contain; display: block; }
    .lightbox-media .lightbox-text {
      padding: 2rem; font-size: 1.1rem; line-height: 1.8; white-space: pre-wrap;
      max-height: 70vh; overflow-y: auto;
    }
    .lightbox-info { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
    .lightbox-title { font-weight: 600; font-size: 1rem; }
    .lightbox-tags { display: flex; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .lightbox-tags .lb-tag {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 600;
    }

    .empty-state { text-align: center; padding: 6rem 2rem; color: var(--text-muted); }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }

    .loading { text-align: center; padding: 4rem; color: var(--text-muted); }

    @media (max-width: 600px) {
      .items-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .board-content { padding: 1rem; }
      .topbar { padding: 1rem; }
      .filter-bar { padding: 0.75rem 1rem; }
      .category-title { font-size: 1.4rem; }
      .lightbox { padding: 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>Oddly<span class="accent">.</span>Board</h1>
      <p>Enter password to view the board</p>
      <div class="login-input-wrap">
        <input type="text" id="passwordInput" placeholder="Password" autocomplete="off">
        <button onclick="attemptLogin()">Enter</button>
      </div>
      <p class="login-error" id="loginError">Wrong password. Try again.</p>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-screen" id="boardScreen">
    <div class="topbar">
      <h1>Oddly<span style="color:var(--accent)">.</span>Board</h1>
      <div class="topbar-actions">
        <a href="admin.html">Admin</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="board-content" id="boardContent">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content">
      <div class="lightbox-media" id="lightboxMedia"></div>
      <div class="lightbox-info" id="lightboxInfo"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lwtutcgfpiztdieowahf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHV0Y2dmcGl6dGRpZW93YWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTU5OTcsImV4cCI6MjA4ODA3MTk5N30.hocUS10WimBr9GfaR4hu96yRX0OYawiBsSQ0Usf3jpM';
    const VIEWER_PASSWORD = 'oddly26';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let categories = [], subcategories = [], items = [], tags = [], itemTags = [];
    let activeCategory = null;
    let activeSubcategory = null;
    let activeTags = new Set();

    // --- AUTH ---
    function attemptLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === VIEWER_PASSWORD) {
        sessionStorage.setItem('oddly_auth', 'true');
        showBoard();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });
    function logout() { sessionStorage.clear(); location.reload(); }
    function showBoard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('boardScreen').style.display = 'block';
      loadBoard();
    }
    if (sessionStorage.getItem('oddly_auth')) showBoard();

    // --- LOAD ---
    async function loadBoard() {
      try {
        const [catRes, subRes, itemRes, tagRes, itRes] = await Promise.all([
          db.from('categories').select('*').order('sort_order'),
          db.from('subcategories').select('*').order('sort_order'),
          db.from('items').select('*').order('sort_order'),
          db.from('tags').select('*').order('name'),
          db.from('item_tags').select('*')
        ]);

        categories = catRes.data || [];
        subcategories = subRes.data || [];
        items = itemRes.data || [];
        tags = tagRes.data || [];
        itemTags = itRes.data || [];

        renderFilters();
        renderBoard();
      } catch (err) {
        console.error('Error loading board:', err);
        document.getElementById('boardContent').innerHTML =
          '<div class="empty-state"><h2>Could not load board</h2><p>Check your Supabase configuration.</p></div>';
      }
    }

    // --- FILTERS ---
    function renderFilters() {
      const bar = document.getElementById('filterBar');
      let html = '<span class="filter-label">Filter</span>';

      // "All" pill
      html += `<span class="filter-pill ${!activeCategory ? 'active' : ''}" onclick="setFilter(null, null)">All</span>`;

      // Category pills
      for (const cat of categories) {
        const isActive = activeCategory === cat.id;
        html += `<span class="filter-pill ${isActive ? 'active' : ''}" onclick="setFilter('${cat.id}', null)">${esc(cat.title)}</span>`;
      }

      // Subcategory pills (only show if a category is selected)
      if (activeCategory) {
        const catSubs = subcategories.filter(s => s.category_id === activeCategory);
        if (catSubs.length > 0) {
          html += '<span class="filter-divider"></span>';
          html += `<span class="filter-pill ${!activeSubcategory ? 'active' : ''}" onclick="setFilter('${activeCategory}', null)">All ${esc(categories.find(c=>c.id===activeCategory)?.title||'')}</span>`;
          for (const sub of catSubs) {
            const isActive = activeSubcategory === sub.id;
            html += `<span class="filter-pill ${isActive ? 'active' : ''}" onclick="setFilter('${activeCategory}', '${sub.id}')">${esc(sub.title)}</span>`;
          }
        }
      }

      // Tag filters
      if (tags.length > 0) {
        html += '<span class="filter-divider"></span>';
        html += '<span class="filter-label">Tags</span>';
        for (const tag of tags) {
          const isActive = activeTags.has(tag.id);
          html += `<span class="tag-filter ${isActive ? 'active' : ''}" style="background:${esc(tag.color)}22;color:${esc(tag.color)}" onclick="toggleTagFilter('${tag.id}')">${esc(tag.name)}</span>`;
        }
      }

      bar.innerHTML = html;
    }

    function setFilter(catId, subId) {
      activeCategory = catId;
      activeSubcategory = subId;
      renderFilters();
      renderBoard();
    }

    function toggleTagFilter(tagId) {
      if (activeTags.has(tagId)) activeTags.delete(tagId);
      else activeTags.add(tagId);
      renderFilters();
      renderBoard();
    }

    function getItemTagIds(itemId) {
      return itemTags.filter(it => it.item_id === itemId).map(it => it.tag_id);
    }

    function getItemTagObjects(itemId) {
      const tagIds = getItemTagIds(itemId);
      return tags.filter(t => tagIds.includes(t.id));
    }

    // --- RENDER ---
    function renderBoard() {
      const content = document.getElementById('boardContent');

      // Filter categories
      let filteredCats = activeCategory
        ? categories.filter(c => c.id === activeCategory)
        : categories;

      if (filteredCats.length === 0) {
        content.innerHTML = '<div class="empty-state"><h2>Nothing here yet</h2><p>Add categories and content via the admin panel.</p></div>';
        return;
      }

      let html = '';
      let hasVisibleItems = false;

      for (const cat of filteredCats) {
        let catSubs = subcategories.filter(s => s.category_id === cat.id);
        if (activeSubcategory) catSubs = catSubs.filter(s => s.id === activeSubcategory);

        let catHtml = '';
        for (const sub of catSubs) {
          let subItems = items.filter(i => i.subcategory_id === sub.id);

          // Tag filter
          if (activeTags.size > 0) {
            subItems = subItems.filter(item => {
              const iTagIds = getItemTagIds(item.id);
              return Array.from(activeTags).some(tid => iTagIds.includes(tid));
            });
          }

          if (subItems.length === 0) continue;
          hasVisibleItems = true;

          catHtml += `<div class="subcategory">
            <div class="subcategory-title">${esc(sub.title)}</div>
            <div class="items-grid">
              ${subItems.map(item => renderCard(item)).join('')}
            </div>
          </div>`;
        }

        if (catHtml) {
          html += `<div class="category">
            <div class="category-title">${esc(cat.title)}</div>
            ${catHtml}
          </div>`;
        }
      }

      if (!hasVisibleItems) {
        content.innerHTML = '<div class="empty-state"><h2>No matching items</h2><p>Try adjusting your filters.</p></div>';
        return;
      }

      content.innerHTML = html;
    }

    function renderCard(item) {
      let inner = '';

      if (item.type === 'embed') {
        const embedHtml = getEmbedHtml(item.content);
        inner = `<div class="card-embed">${embedHtml}</div>`;
      } else if (item.type === 'text') {
        const shortText = (item.content || '').length > 200
          ? item.content.substring(0, 200) + '…'
          : item.content;
        inner = `<div class="card-text">${esc(shortText)}</div>`;
      } else if (item.type === 'image') {
        inner = `<div class="card-image"><img src="${esc(item.content)}" alt="${esc(item.title || '')}" loading="lazy"></div>`;
      }

      const itemTagObjs = getItemTagObjects(item.id);
      const hasOverlay = item.title || itemTagObjs.length > 0;
      const overlayHtml = hasOverlay ? `
        <div class="card-overlay">
          ${item.title ? `<div class="card-overlay-title">${esc(item.title)}</div>` : ''}
          ${itemTagObjs.length > 0 ? `<div class="card-overlay-tags">${itemTagObjs.map(t =>
            `<span class="card-tag" style="background:${esc(t.color)}33;color:${esc(t.color)}">${esc(t.name)}</span>`
          ).join('')}</div>` : ''}
        </div>
      ` : '';

      return `<div class="card" onclick="openLightbox('${item.id}')">${inner}${overlayHtml}</div>`;
    }

    // --- LIGHTBOX ---
    function openLightbox(itemId) {
      const item = items.find(i => i.id === itemId);
      if (!item) return;

      const mediaEl = document.getElementById('lightboxMedia');
      const infoEl = document.getElementById('lightboxInfo');

      if (item.type === 'embed') {
        const embedHtml = getEmbedHtml(item.content);
        const isLandscape = isLandscapeEmbed(item.content);
        mediaEl.className = 'lightbox-media' + (isLandscape ? ' landscape' : '');
        mediaEl.innerHTML = embedHtml;
        // Re-enable pointer events in lightbox
        const iframe = mediaEl.querySelector('iframe');
        if (iframe) iframe.style.pointerEvents = 'auto';
      } else if (item.type === 'text') {
        mediaEl.className = 'lightbox-media';
        mediaEl.innerHTML = `<div class="lightbox-text">${esc(item.content)}</div>`;
      } else if (item.type === 'image') {
        mediaEl.className = 'lightbox-media';
        mediaEl.innerHTML = `<img src="${esc(item.content)}" alt="${esc(item.title || '')}">`;
      }

      const itemTagObjs = getItemTagObjects(item.id);
      let infoHtml = '';
      if (item.title) infoHtml += `<div class="lightbox-title">${esc(item.title)}</div>`;
      if (itemTagObjs.length > 0) {
        infoHtml += `<div class="lightbox-tags">${itemTagObjs.map(t =>
          `<span class="lb-tag" style="background:${esc(t.color)}33;color:${esc(t.color)}">${esc(t.name)}</span>`
        ).join('')}</div>`;
      }
      infoEl.innerHTML = infoHtml;
      infoEl.style.display = infoHtml ? '' : 'none';

      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      // Clean up iframes
      document.getElementById('lightboxMedia').innerHTML = '';
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // --- EMBED HELPERS ---
    function isLandscapeEmbed(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com')
        || url.includes('x.com') || url.includes('twitter.com');
    }

    function getEmbedHtml(url) {
      if (!url) return '';

      if (url.includes('instagram.com')) {
        const match = url.match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
        if (match) return `<iframe src="https://www.instagram.com/${match[1]}/${match[2]}/embed/captioned/" allowfullscreen loading="lazy" style="background:#000"></iframe>`;
      }
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let vid = '';
        if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split(/[?&#]/)[0];
        else if (url.includes('/shorts/')) vid = url.split('/shorts/')[1]?.split(/[?&#]/)[0];
        else { const m = url.match(/[?&]v=([A-Za-z0-9_-]+)/); vid = m?.[1]; }
        if (vid) return `<iframe src="https://www.youtube.com/embed/${vid}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('tiktok.com')) {
        const match = url.match(/\/video\/(\d+)/);
        if (match) return `<iframe src="https://www.tiktok.com/embed/v2/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('x.com') || url.includes('twitter.com')) {
        const match = url.match(/\/status\/(\d+)/);
        if (match) return `<iframe src="https://platform.twitter.com/embed/Tweet.html?id=${match[1]}&theme=dark" allowfullscreen loading="lazy" style="background:#000"></iframe>`;
      }
      if (url.includes('vimeo.com')) {
        const match = url.match(/vimeo\.com\/(\d+)/);
        if (match) return `<iframe src="https://player.vimeo.com/video/${match[1]}?title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
      }

      return `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--surface)">
        <a href="${esc(url)}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:0.9rem;">Open link &#8599;</a>
      </div>`;
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
