<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddly Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8ff00;
      --accent-dim: #c8ff0022;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN SCREEN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .login-box h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
    }

    .login-box .accent { color: var(--accent); }

    .login-box p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .login-input-wrap {
      display: flex;
      gap: 0.5rem;
    }

    .login-input-wrap input {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-input-wrap input:focus {
      border-color: var(--accent);
    }

    .login-input-wrap button {
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-input-wrap button:hover { opacity: 0.85; }

    .login-error {
      color: #ff4d4d;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* BOARD */
    .board-screen { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .topbar h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .topbar-actions a,
    .topbar-actions button {
      color: var(--text-muted);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .topbar-actions a:hover,
    .topbar-actions button:hover {
      color: var(--text);
      border-color: #444;
    }

    /* Filter tags */
    .filter-bar {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-tag {
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .filter-tag:hover:not(.active) {
      border-color: #555;
      color: var(--text);
    }

    /* Grid */
    .board-grid {
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #3a3a3a;
    }

    .card-embed {
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: 500px;
      background: #000;
    }

    .card-embed.landscape {
      aspect-ratio: 16 / 9;
      max-height: 300px;
    }

    .card-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-body {
      padding: 1rem 1.2rem;
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.2rem;
      border-top: 1px solid var(--border);
    }

    .card-platform {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .board-grid {
        grid-template-columns: 1fr;
        padding: 1rem;
      }
      .topbar { padding: 1rem; }
      .filter-bar { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>Oddly<span class="accent">.</span>Board</h1>
      <p>Enter password to view the board</p>
      <div class="login-input-wrap">
        <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
        <button onclick="attemptLogin()">Enter</button>
      </div>
      <p class="login-error" id="loginError">Wrong password. Try again.</p>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-screen" id="boardScreen">
    <div class="topbar">
      <h1>Oddly<span style="color:var(--accent)">.</span>Board</h1>
      <div class="topbar-actions">
        <a href="admin.html">Admin</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-tag active" data-filter="all">All</button>
      <button class="filter-tag" data-filter="instagram">Instagram</button>
      <button class="filter-tag" data-filter="youtube">YouTube</button>
      <button class="filter-tag" data-filter="tiktok">TikTok</button>
      <button class="filter-tag" data-filter="other">Other</button>
    </div>

    <div id="boardContent">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    // ============================================
    // CONFIG — Update these with your Supabase details
    // ============================================
    const SUPABASE_URL = 'https://lwtutcgfpiztdieowahf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHV0Y2dmcGl6dGRpZW93YWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTU5OTcsImV4cCI6MjA4ODA3MTk5N30.hocUS10WimBr9GfaR4hu96yRX0OYawiBsSQ0Usf3jpM';

    // Passwords (change these!)
    const VIEWER_PASSWORD = 'oddly2024';
    const ADMIN_PASSWORD = 'oddlyadmin2024';
    // ============================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allItems = [];
    let currentFilter = 'all';

    // --- AUTH ---
    function attemptLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === VIEWER_PASSWORD || pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('oddly_auth', 'true');
        if (pw === ADMIN_PASSWORD) sessionStorage.setItem('oddly_admin', 'true');
        showBoard();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function showBoard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('boardScreen').style.display = 'block';
      loadItems();
    }

    // --- Check session ---
    if (sessionStorage.getItem('oddly_auth')) {
      showBoard();
    }

    // --- DATA ---
    async function loadItems() {
      try {
        const { data, error } = await supabase
          .from('items')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allItems = data || [];
        renderBoard();
      } catch (err) {
        console.error('Error loading items:', err);
        document.getElementById('boardContent').innerHTML =
          '<div class="empty-state"><h2>Could not load items</h2><p>Check your Supabase configuration.</p></div>';
      }
    }

    function renderBoard() {
      const filtered = currentFilter === 'all'
        ? allItems
        : allItems.filter(item => item.platform === currentFilter);

      if (filtered.length === 0) {
        document.getElementById('boardContent').innerHTML =
          '<div class="empty-state"><h2>Nothing here yet</h2><p>Add some inspiration via the admin panel.</p></div>';
        return;
      }

      const html = '<div class="board-grid">' + filtered.map(item => {
        const embedHtml = getEmbedHtml(item);
        const isLandscape = item.platform === 'youtube';
        const date = new Date(item.created_at).toLocaleDateString('nl-NL', {
          day: 'numeric', month: 'short'
        });

        return `
          <div class="card">
            <div class="card-embed ${isLandscape ? 'landscape' : ''}">
              ${embedHtml}
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(item.title)}</div>
              ${item.description ? `<div class="card-desc">${escapeHtml(item.description)}</div>` : ''}
            </div>
            <div class="card-meta">
              <span class="card-platform">${item.platform || 'link'}</span>
              <span class="card-date">${date}</span>
            </div>
          </div>
        `;
      }).join('') + '</div>';

      document.getElementById('boardContent').innerHTML = html;
    }

    function getEmbedHtml(item) {
      const url = item.url || '';

      // Instagram
      if (url.includes('instagram.com')) {
        const match = url.match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
        if (match) {
          return `<iframe src="https://www.instagram.com/${match[1]}/${match[2]}/embed/" allowfullscreen loading="lazy"></iframe>`;
        }
      }

      // YouTube
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let videoId = '';
        if (url.includes('youtu.be/')) {
          videoId = url.split('youtu.be/')[1]?.split(/[?&#]/)[0];
        } else {
          const match = url.match(/[?&]v=([A-Za-z0-9_-]+)/);
          videoId = match?.[1];
        }
        if (videoId) {
          return `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
        }
      }

      // TikTok
      if (url.includes('tiktok.com')) {
        const match = url.match(/\/video\/(\d+)/);
        if (match) {
          return `<iframe src="https://www.tiktok.com/embed/v2/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
        }
      }

      // Fallback: show as link
      return `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--surface)">
        <a href="${escapeHtml(url)}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:0.9rem;">Open link &#8599;</a>
      </div>`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // --- FILTERS ---
    document.getElementById('filterBar').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-tag')) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        renderBoard();
      }
    });
  </script>
</body>
</html>
