<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddly Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface-hover: #1a1a1a;
      --border: #2a2a2a; --text: #f0f0f0; --text-muted: #888;
      --accent: #A855F7; --danger: #ff4d4d; --success: #00d68f;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ---- LOGIN ---- */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-box { text-align: center; max-width: 360px; width: 100%; }
    .login-box h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
    .login-logo { height: 48px; margin-bottom: 0.5rem; }
    .login-box .accent { color: var(--accent); }
    .login-box p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .login-input-wrap { display: flex; gap: 0.5rem; }
    .login-input-wrap input {
      flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none;
    }
    .login-input-wrap input:focus { border-color: var(--accent); }
    .login-input-wrap button {
      padding: 0.85rem 1.5rem; border: none; border-radius: 10px; background: var(--accent);
      color: #000; font-family: inherit; font-weight: 600; font-size: 0.95rem; cursor: pointer;
    }
    .login-input-wrap button:hover { opacity: 0.85; }
    .login-error { color: #ff4d4d; font-size: 0.85rem; margin-top: 0.75rem; display: none; }

    /* ---- TOPBAR ---- */
    .board-screen { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .topbar h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .topbar-logo { height: 28px; }
    .topbar-actions { display: flex; gap: 0.5rem; align-items: center; }
    .topbar-btn {
      color: var(--text-muted); text-decoration: none; font-family: inherit; font-size: 0.85rem;
      background: var(--surface); border: 1px solid var(--border); padding: 0.5rem 0.85rem;
      border-radius: 8px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .topbar-btn:hover { color: var(--text); border-color: #444; }
    .topbar-btn.edit-active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ---- FILTER BAR ---- */
    .filter-bar {
      padding: 0.5rem 2rem 0.75rem; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.4rem;
      position: sticky; top: 56px; background: var(--bg); z-index: 99;
    }
    .filter-row {
      display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
    }
    .filter-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 0.25rem; min-width: 58px; }
    .filter-pill {
      padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
    }
    .filter-pill:hover { border-color: #555; color: var(--text); }
    .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 0.15rem; }
    .tag-filter {
      padding: 0.25rem 0.6rem; border-radius: 14px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 2px solid transparent; opacity: 0.5;
    }
    .tag-filter:hover { opacity: 0.8; }
    .tag-filter.active { opacity: 1; border-color: rgba(255,255,255,0.3); }

    /* ---- BOARD ---- */
    .board-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .category { margin-bottom: 3rem; }
    .category-header-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .category-title {
      font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em;
      padding-bottom: 0.3rem; border-bottom: 2px solid var(--accent);
    }
    .category-title-input {
      font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; font-family: inherit;
      background: transparent; border: none; border-bottom: 2px solid var(--accent);
      color: var(--text); outline: none; padding: 0; padding-bottom: 0.3rem; max-width: 400px;
    }
    .category-title-input:focus { border-bottom-color: var(--text); }

    .subcategory { margin-bottom: 2rem; margin-left: 0.5rem; }
    .subcategory-header-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .subcategory-title {
      font-size: 1.1rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .subcategory-title-input {
      font-size: 1.1rem; font-weight: 600; color: var(--text-muted); font-family: inherit;
      text-transform: uppercase; letter-spacing: 0.04em;
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      outline: none; padding: 0; padding-bottom: 0.2rem;
    }
    .subcategory-title-input:focus { border-bottom-color: var(--accent); color: var(--text); }

    /* ---- GRID ---- */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: transform 0.2s, border-color 0.2s;
      cursor: pointer; aspect-ratio: 1 / 1; position: relative;
    }
    .card:hover { transform: translateY(-2px); border-color: #3a3a3a; }

    .card-embed { width: 100%; height: 100%; background: #000; position: absolute; inset: 0; overflow: hidden; }
    .card-embed iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

    .card-text {
      padding: 1.2rem; font-size: 0.85rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; overflow: hidden;
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }

    .card-image { position: absolute; inset: 0; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-video { position: absolute; inset: 0; background: #000; }
    .card-video video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-video .video-play-icon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; background: rgba(0,0,0,0.6); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .card-video .video-play-icon::after {
      content: ''; display: block; width: 0; height: 0;
      border-style: solid; border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent #fff; margin-left: 2px;
    }

    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 0.8rem; pointer-events: none;
    }
    .card-overlay-title { font-weight: 600; font-size: 0.8rem; }
    .card-overlay-tags { display: flex; gap: 0.25rem; margin-top: 0.3rem; flex-wrap: wrap; }
    .card-overlay-tags .card-tag { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 8px; font-weight: 600; }

    /* Sortable drag styles */
    .sortable-ghost { opacity: 0.3; }
    .sortable-chosen { cursor: grabbing; }
    .sortable-drag {
      opacity: 0.9 !important; transform: scale(1.03); box-shadow: 0 8px 32px rgba(168,85,247,0.25);
      border-color: var(--accent) !important;
    }
    .edit-mode .card { cursor: grab; }
    .edit-mode .card:active { cursor: grabbing; }

    /* Edit mode card controls */
    .card-edit-controls {
      position: absolute; top: 0.5rem; right: 0.5rem; display: none;
      gap: 0.3rem; z-index: 10;
    }
    .edit-mode .card-edit-controls { display: flex; }
    .card-ctrl {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.75rem; transition: all 0.15s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .card-ctrl-edit { background: rgba(168,85,247,0.85); color: #fff; }
    .card-ctrl-delete { background: rgba(255,77,77,0.85); color: #fff; }
    .card-ctrl:hover { transform: scale(1.1); }

    /* Edit mode inline buttons */
    .edit-inline-btn {
      display: none; padding: 0.3rem 0.7rem; border-radius: 8px; border: 1px dashed var(--border);
      background: transparent; color: var(--text-muted); font-family: inherit; font-size: 0.78rem;
      cursor: pointer; transition: all 0.15s;
    }
    .edit-mode .edit-inline-btn { display: inline-flex; }
    .edit-inline-btn:hover { border-color: var(--accent); color: var(--accent); }
    .edit-delete-btn {
      display: none; padding: 0.2rem 0.5rem; border-radius: 6px; border: none;
      background: transparent; color: var(--text-muted); font-family: inherit; font-size: 0.7rem;
      cursor: pointer; transition: all 0.15s;
    }
    .edit-mode .edit-delete-btn { display: inline-flex; }
    .edit-delete-btn:hover { color: var(--danger); }

    /* ---- FLOATING ACTION BUTTON ---- */
    .fab {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 150;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 1.8rem; font-weight: 300;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(168,85,247,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(168,85,247,0.45); }
    .fab:active { transform: scale(0.95); }

    /* ---- MODALS ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
      display: none; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.8rem;
    }
    .modal h2 { font-size: 1.15rem; margin-bottom: 1.2rem; font-weight: 700; }
    .modal label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal input[type="text"], .modal input[type="url"], .modal textarea, .modal select {
      width: 100%; padding: 0.6rem 0.85rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
    .modal textarea { resize: vertical; min-height: 80px; }
    .form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
    .form-row > * { flex: 1; }
    .form-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; }

    .btn {
      padding: 0.55rem 1.1rem; border: none; border-radius: 10px; background: var(--accent);
      color: #fff; font-family: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-outline:hover { border-color: #555; color: var(--text); }
    .btn-save { background: var(--success); color: #000; }
    .btn-danger-solid { background: var(--danger); color: #fff; }

    /* Tag selector */
    .tag-selector { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .tag-option {
      padding: 0.25rem 0.6rem; border-radius: 14px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 2px solid transparent; opacity: 0.5;
    }
    .tag-option.selected { opacity: 1; border-color: rgba(255,255,255,0.3); }
    .tag-option:hover { opacity: 0.8; }

    /* File upload */
    .file-upload-area {
      border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem;
      text-align: center; color: var(--text-muted); cursor: pointer; transition: border-color 0.2s;
      font-size: 0.85rem;
    }
    .file-upload-area:hover { border-color: var(--accent); }
    .file-upload-area.dragging { border-color: var(--accent); background: #A855F711; }
    .file-upload-area img, .file-upload-area video { max-width: 180px; max-height: 120px; border-radius: 6px; margin-top: 0.5rem; }

    /* Preview */
    .live-preview {
      margin-top: 0.75rem; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; background: var(--bg);
    }
    .live-preview-label {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border);
    }
    .live-preview-content { max-height: 220px; overflow: hidden; }
    .live-preview-content iframe { width: 100%; height: 200px; border: none; }
    .live-preview-content img { width: 100%; max-height: 200px; object-fit: cover; display: block; }
    .live-preview-content .preview-text {
      padding: 0.75rem; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap;
      max-height: 180px; overflow-y: auto;
    }

    /* Tags management in settings */
    .tags-manage { margin-bottom: 1.5rem; }
    .tags-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; min-height: 28px; }
    .tag-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.25rem 0.65rem; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
    }
    .tag-pill .tag-x { cursor: pointer; opacity: 0.6; font-size: 0.65rem; }
    .tag-pill .tag-x:hover { opacity: 1; }
    .add-tag-row { display: flex; gap: 0.5rem; align-items: center; }
    .add-tag-row input[type="text"] { max-width: 160px; padding: 0.45rem 0.7rem; font-size: 0.85rem; }
    .add-tag-row input[type="color"] {
      width: 34px; height: 34px; padding: 2px; border-radius: 8px; cursor: pointer;
      background: var(--bg); border: 1px solid var(--border);
    }

    /* New category/sub inline row */
    .new-inline-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    .new-inline-row input { flex: 1; padding: 0.45rem 0.7rem; font-size: 0.85rem; }
    .new-inline-row .btn { padding: 0.45rem 0.8rem; font-size: 0.8rem; }

    /* ---- LIGHTBOX ---- */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300;
      display: none; align-items: center; justify-content: center; padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-close {
      position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none;
      color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 310; opacity: 0.6;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-edit {
      position: absolute; top: 1.2rem; right: 4rem; background: var(--accent); border: none;
      color: #fff; font-size: 0.85rem; font-weight: 600; font-family: inherit;
      cursor: pointer; z-index: 310; padding: 0.4rem 0.9rem; border-radius: 8px;
      display: flex; align-items: center; gap: 0.3rem; opacity: 0.85;
    }
    .lightbox-edit:hover { opacity: 1; }
    .lightbox-content {
      max-width: 700px; width: 100%; max-height: 90vh; border-radius: 16px;
      overflow: hidden; background: var(--surface); border: 1px solid var(--border);
    }
    .lightbox-media { width: 100%; background: #000; }
    .lightbox-media iframe { width: 100%; aspect-ratio: 9/16; max-height: 70vh; border: none; }
    .lightbox-media.landscape iframe { aspect-ratio: 16/9; }
    .lightbox-media img { width: 100%; max-height: 70vh; object-fit: contain; display: block; }
    .lightbox-media video { width: 100%; max-height: 70vh; display: block; background: #000; }
    .lightbox-media .lightbox-text {
      padding: 2rem; font-size: 1.05rem; line-height: 1.8; white-space: pre-wrap;
      max-height: 70vh; overflow-y: auto; background: var(--surface);
    }
    .lightbox-info { padding: 1rem 1.2rem; border-top: 1px solid var(--border); }
    .lightbox-title { font-weight: 600; font-size: 0.95rem; }
    .lightbox-tags { display: flex; gap: 0.35rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .lightbox-tags .lb-tag { font-size: 0.72rem; padding: 0.15rem 0.55rem; border-radius: 10px; font-weight: 600; }

    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }
    .loading { text-align: center; padding: 4rem; color: var(--text-muted); }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--accent); color: #fff; padding: 0.65rem 1.3rem; border-radius: 10px;
      font-weight: 600; font-size: 0.85rem; transition: transform 0.3s ease; z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); color: #fff; }

    @media (max-width: 600px) {
      .items-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
      .board-content { padding: 1rem; }
      .topbar { padding: 1rem; }
      .filter-bar { padding: 0.6rem 1rem; top: 48px; }
      .category-title, .category-title-input { font-size: 1.3rem; }
      .lightbox { padding: 0.5rem; }
      .modal { padding: 1.2rem; }
      .fab { bottom: 1.2rem; right: 1.2rem; width: 50px; height: 50px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <img src="logo.png" alt="Oddly" class="login-logo">
      <p>Enter password to view the board</p>
      <div class="login-input-wrap">
        <input type="text" id="passwordInput" placeholder="Password" autocomplete="off">
        <button onclick="attemptLogin()">Enter</button>
      </div>
      <p class="login-error" id="loginError">Wrong password. Try again.</p>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-screen" id="boardScreen">
    <div class="topbar">
      <img src="logo.png" alt="Oddly" class="topbar-logo">
      <div class="topbar-actions">
        <button class="topbar-btn" id="editToggle" onclick="toggleEditMode()">
          <span id="editToggleIcon">&#9998;</span> <span id="editToggleLabel">Edit</span>
        </button>
        <button class="topbar-btn" onclick="openSettings()">&#9881;</button>
        <button class="topbar-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="board-content" id="boardContent">
      <div class="loading">Loading...</div>
    </div>

    <!-- FLOATING ACTION BUTTON -->
    <button class="fab" id="fabBtn" onclick="openAddModal()" title="Add content">+</button>
  </div>

  <!-- ADD ITEM MODAL (from floating button) -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2 id="addModalTitle">Add Content</h2>
      <div class="form-row">
        <div>
          <label>Category</label>
          <select id="add-category" onchange="populateSubcategorySelect()">
          </select>
        </div>
        <div>
          <label>Subcategory</label>
          <select id="add-subcategory">
          </select>
        </div>
      </div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
        <button class="btn btn-outline" style="font-size:0.75rem;padding:0.3rem 0.6rem;" onclick="showNewCategoryRow()">+ New Category</button>
        <button class="btn btn-outline" style="font-size:0.75rem;padding:0.3rem 0.6rem;" onclick="showNewSubcategoryRow()">+ New Subcategory</button>
      </div>
      <div id="newCategoryRow" class="new-inline-row" style="display:none;margin-bottom:0.75rem;">
        <input type="text" id="newCatName" placeholder="Category name...">
        <button class="btn" onclick="createCategoryInline()">Create</button>
      </div>
      <div id="newSubcategoryRow" class="new-inline-row" style="display:none;margin-bottom:0.75rem;">
        <input type="text" id="newSubName" placeholder="Subcategory name...">
        <button class="btn" onclick="createSubcategoryInline()">Create</button>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin-bottom:0.75rem;">
      <div class="form-row">
        <div>
          <label>Type</label>
          <select id="add-type" onchange="toggleAddFields(); updateAddPreview();">
            <option value="embed">Embed (link)</option>
            <option value="text">Text</option>
            <option value="image">Image</option>
            <option value="video">Video</option>
          </select>
        </div>
        <div>
          <label>Title (optional)</label>
          <input type="text" id="add-title" placeholder="Name this item">
        </div>
      </div>
      <div id="add-fields-embed">
        <label>URL</label>
        <input type="url" id="add-url" placeholder="https://instagram.com/reel/..." oninput="updateAddPreview()">
      </div>
      <div id="add-fields-text" style="display:none">
        <label>Text</label>
        <textarea id="add-text" placeholder="Write something..." oninput="updateAddPreview()"></textarea>

  <script>
    // ---- CONFIG ----
    const SUPABASE_URL = 'https://lwtutcgfpiztdieowahf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHV0Y2dmcGl6dGRpZW93YWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTU5OTcsImV4cCI6MjA4ODA3MTk5N30.hocUS10WimBr9GfaR4hu96yRX0OYawiBsSQ0Usf3jpM';
    const VIEWER_PASS = 'oddly26';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allCategories = [], allSubcategories = [], allItems = [], allTags = [], allItemTags = [];
    let editMode = false;
    let addPendingFile = null;
    let editPendingFile = null;
    let activeTagFilter = null;
    let activeCatFilter = null;
    let activeSubFilter = null;
    let currentLightboxItemId = null;

    // ---- LOGIN ----
    function attemptLogin() {
      const pw = document.getElementById('passwordInput').value.trim();
      if (pw === VIEWER_PASS) {
        sessionStorage.setItem('oddly_auth', '1');
        showBoard();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    function showBoard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('boardScreen').style.display = 'block';
      loadAll();
    }

    function logout() {
      sessionStorage.removeItem('oddly_auth');
      location.reload();
    }

    if (sessionStorage.getItem('oddly_auth') === '1') showBoard();

    // ---- LOAD ----
    async function loadAll() {
      const [c, s, i, t, it] = await Promise.all([
        db.from('categories').select('*').order('sort_order'),
        db.from('subcategories').select('*').order('sort_order'),
        db.from('items').select('*').order('sort_order'),
        db.from('tags').select('*').order('name'),
        db.from('item_tags').select('*')
      ]);
      allCategories = c.data || [];
      allSubcategories = s.data || [];
      allItems = i.data || [];
      allTags = t.data || [];
      allItemTags = it.data || [];
      renderFilterBar();
      renderBoard();
    }

    // ---- FILTER BAR ----
    function renderFilterBar() {
      const bar = document.getElementById('filterBar');
      let html = '';

      // Row 1: Category filter
      if (allCategories.length > 0) {
        html += `<div class="filter-row">`;
        html += `<span class="filter-label">Category</span>`;
        html += `<span class="filter-pill ${activeCatFilter === null ? 'active' : ''}" onclick="setCatFilter(null)">All</span>`;
        allCategories.forEach(cat => {
          html += `<span class="filter-pill ${activeCatFilter === cat.id ? 'active' : ''}" onclick="setCatFilter('${cat.id}')">${esc(cat.title)}</span>`;
        });
        html += `</div>`;
      }

      // Row 2: Subcategory filter (only when a category is selected)
      if (activeCatFilter) {
        const subs = allSubcategories.filter(s => s.category_id === activeCatFilter);
        if (subs.length > 0) {
          html += `<div class="filter-row">`;
          html += `<span class="filter-label">Sub</span>`;
          html += `<span class="filter-pill ${activeSubFilter === null ? 'active' : ''}" onclick="setSubFilter(null)">All</span>`;
          subs.forEach(sub => {
            html += `<span class="filter-pill ${activeSubFilter === sub.id ? 'active' : ''}" onclick="setSubFilter('${sub.id}')">${esc(sub.title)}</span>`;
          });
          html += `</div>`;
        }
      }

      // Row 3: Tags
      if (allTags.length > 0) {
        html += `<div class="filter-row">`;
        html += `<span class="filter-label">Tags</span>`;
        allTags.forEach(tag => {
          html += `<span class="tag-filter ${activeTagFilter === tag.id ? 'active' : ''}"
            style="background:${esc(tag.color)}22;color:${esc(tag.color)}"
            onclick="setTagFilter('${tag.id}')">${esc(tag.name)}</span>`;
        });
        html += `</div>`;
      }

      bar.innerHTML = html;
    }

    function setCatFilter(catId) {
      activeCatFilter = activeCatFilter === catId ? null : catId;
      activeSubFilter = null; // reset sub when changing cat
      renderFilterBar();
      renderBoard();
    }
    function setSubFilter(subId) {
      activeSubFilter = activeSubFilter === subId ? null : subId;
      renderFilterBar();
      renderBoard();
    }
    function setTagFilter(tagId) {
      activeTagFilter = activeTagFilter === tagId ? null : tagId;
      renderFilterBar();
      renderBoard();
    }

    // ---- BOARD RENDER ----
    function renderBoard() {
      const container = document.getElementById('boardContent');

      if (allCategories.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No content yet</h2>
            <p>Click the + button to add your first item</p>
          </div>`;
        return;
      }

      let html = '';
      let filteredCategories = allCategories;
      if (activeCatFilter) filteredCategories = allCategories.filter(c => c.id === activeCatFilter);

      filteredCategories.forEach(cat => {
        let subs = allSubcategories.filter(s => s.category_id === cat.id);
        if (activeSubFilter) subs = subs.filter(s => s.id === activeSubFilter);
        let subsHtml = '';

        subs.forEach(sub => {
          let items = allItems.filter(i => i.subcategory_id === sub.id);

          // Apply filters
          if (activeTagFilter) {
            const tagItemIds = allItemTags.filter(it => it.tag_id === activeTagFilter).map(it => it.item_id);
            items = items.filter(i => tagItemIds.includes(i.id));
          }

          if (items.length === 0 && !editMode) return;

          subsHtml += `
            <div class="subcategory" data-sub-id="${sub.id}">
              <div class="subcategory-header-row">
                ${editMode
                  ? `<input class="subcategory-title-input" value="${esc(sub.title)}" onchange="updateSubcategory('${sub.id}', this.value)">`
                  : `<span class="subcategory-title">${esc(sub.title)}</span>`
                }
                <button class="edit-delete-btn" onclick="deleteSubcategory('${sub.id}')">Delete</button>
              </div>
              <div class="items-grid" data-sub-id="${sub.id}">
                ${items.map(item => renderCard(item)).join('')}
              </div>
            </div>`;
        });

        // Skip empty categories when not in edit mode and filters are active
        if (!subsHtml && !editMode) return;

        html += `
          <div class="category" data-cat-id="${cat.id}">
            <div class="category-header-row">
              ${editMode
                ? `<input class="category-title-input" value="${esc(cat.title)}" onchange="updateCategory('${cat.id}', this.value)">`
                : `<span class="category-title">${esc(cat.title)}</span>`
              }
              <button class="edit-inline-btn" onclick="promptAddSubcategory('${cat.id}')">+ Subcategory</button>
              <button class="edit-delete-btn" onclick="deleteCategory('${cat.id}')">Delete Category</button>
            </div>
            ${subsHtml}
          </div>`;
      });

      if (!html) {
        html = `<div class="empty-state"><h2>No matching items</h2><p>Try changing your filters</p></div>`;
      }

      container.innerHTML = html;

      // Init sortable in edit mode
      if (editMode) {
        document.querySelectorAll('.items-grid').forEach(el => {
          new Sortable(el, {
            group: 'items',
            animation: 200,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            dragClass: 'sortable-drag',
            onEnd: async (evt) => {
              const itemId = evt.item.dataset.itemId;
              const newSubId = evt.to.dataset.subId;
              // Update sort order in source grid
              const fromCards = evt.from.querySelectorAll('.card');
              await Promise.all(Array.from(fromCards).map((el, i) =>
                db.from('items').update({ sort_order: i }).eq('id', el.dataset.itemId)
              ));
              // Update sort order + subcategory in target grid
              const toCards = evt.to.querySelectorAll('.card');
              await Promise.all(Array.from(toCards).map((el, i) =>
                db.from('items').update({ sort_order: i, subcategory_id: newSubId }).eq('id', el.dataset.itemId)
              ));
              loadAll();
            }
          });
        });
      }

      // Render X/Twitter embeds
    }

    function renderCard(item) {
      const itemTags = getItemTags(item.id);
      let mediaHtml = '';

      if (item.type === 'embed') {
        const embedHtml = getEmbedHtml(item.content);
        mediaHtml = `<div class="card-embed">${embedHtml}</div>`;
      } else if (item.type === 'text') {
        mediaHtml = `<div class="card-text">${esc(item.content || '')}</div>`;
      } else if (item.type === 'image') {
        mediaHtml = `<div class="card-image"><img src="${esc(item.content || '')}" alt="" loading="lazy"></div>`;
      } else if (item.type === 'video') {
        mediaHtml = `<div class="card-video"><video src="${esc(item.content || '')}" muted preload="metadata"></video><div class="video-play-icon"></div></div>`;
      }

      const overlayTags = itemTags.length > 0
        ? `<div class="card-overlay-tags">${itemTags.map(t =>
            `<span class="card-tag" style="background:${esc(t.color)}33;color:${esc(t.color)}">${esc(t.name)}</span>`
          ).join('')}</div>`
        : '';

      const hasOverlay = item.title || itemTags.length > 0;

      return `
        <div class="card" data-item-id="${item.id}" onclick="openLightbox('${item.id}')">
          ${mediaHtml}
          <div class="card-edit-controls">
            <button class="card-ctrl card-ctrl-edit" onclick="event.stopPropagation(); openEditModal('${item.id}')">&#9998;</button>
            <button class="card-ctrl card-ctrl-delete" onclick="event.stopPropagation(); deleteItem('${item.id}')">&#10005;</button>
          </div>
          ${hasOverlay ? `
            <div class="card-overlay">
              ${item.title ? `<div class="card-overlay-title">${esc(item.title)}</div>` : ''}
              ${overlayTags}
            </div>` : ''}
        </div>`;
    }

    // ---- EDIT MODE ----
    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('editToggle');
      const label = document.getElementById('editToggleLabel');
      if (editMode) {
        btn.classList.add('edit-active');
        label.textContent = 'Done';
        document.getElementById('boardContent').classList.add('edit-mode');
      } else {
        btn.classList.remove('edit-active');
        label.textContent = 'Edit';
        document.getElementById('boardContent').classList.remove('edit-mode');
      }
      renderBoard();
    }

    // ---- ADD MODAL (floating button) ----
    function openAddModal() {
      // Reset fields
      document.getElementById('add-type').value = 'embed';
      document.getElementById('add-title').value = '';
      document.getElementById('add-url').value = '';
      document.getElementById('add-text').value = '';
      document.getElementById('add-file-preview').innerHTML = '';
      document.getElementById('add-video-preview').innerHTML = '';
      document.getElementById('add-live-preview').style.display = 'none';
      addPendingFile = null;
      addPendingVideo = null;
      document.getElementById('newCategoryRow').style.display = 'none';
      document.getElementById('newSubcategoryRow').style.display = 'none';
      toggleAddFields();
      populateCategorySelect();
      renderTagSelector('add-tag-selector');
      document.getElementById('addModal').classList.add('open');
    }
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
      addPendingFile = null;
    }

    function populateCategorySelect() {
      const sel = document.getElementById('add-category');
      sel.innerHTML = allCategories.map(c => `<option value="${c.id}">${esc(c.title)}</option>`).join('');
      populateSubcategorySelect();
    }
    function populateSubcategorySelect() {
      const catId = document.getElementById('add-category').value;
      const sel = document.getElementById('add-subcategory');
      const subs = allSubcategories.filter(s => s.category_id === catId);
      sel.innerHTML = subs.map(s => `<option value="${s.id}">${esc(s.title)}</option>`).join('');
      if (subs.length === 0) sel.innerHTML = '<option value="">-- No subcategories --</option>';
    }

    function showNewCategoryRow() {
      document.getElementById('newCategoryRow').style.display = 'flex';
      document.getElementById('newCatName').focus();
    }
    function showNewSubcategoryRow() {
      document.getElementById('newSubcategoryRow').style.display = 'flex';
      document.getElementById('newSubName').focus();
    }

    async function createCategoryInline() {
      const name = document.getElementById('newCatName').value.trim();
      if (!name) { toast('Enter a name', true); return; }
      const { data, error } = await db.from('categories').insert([{ title: name, sort_order: allCategories.length }]).select();
      if (error) { toast('Error', true); return; }
      document.getElementById('newCatName').value = '';
      document.getElementById('newCategoryRow').style.display = 'none';
      await loadAll();
      // Select the new category
      const sel = document.getElementById('add-category');
      populateCategorySelect();
      if (data && data[0]) sel.value = data[0].id;
      populateSubcategorySelect();
      toast('Category created');
    }

    async function createSubcategoryInline() {
      const catId = document.getElementById('add-category').value;
      if (!catId) { toast('Select a category first', true); return; }
      const name = document.getElementById('newSubName').value.trim();
      if (!name) { toast('Enter a name', true); return; }
      const subs = allSubcategories.filter(s => s.category_id === catId);
      const { data, error } = await db.from('subcategories').insert([{ category_id: catId, title: name, sort_order: subs.length }]).select();
      if (error) { toast('Error', true); return; }
      document.getElementById('newSubName').value = '';
      document.getElementById('newSubcategoryRow').style.display = 'none';
      await loadAll();
      populateCategorySelect();
      document.getElementById('add-category').value = catId;
      populateSubcategorySelect();
      if (data && data[0]) document.getElementById('add-subcategory').value = data[0].id;
      toast('Subcategory created');
    }

    function toggleAddFields() {
      const type = document.getElementById('add-type').value;
      document.getElementById('add-fields-embed').style.display = type === 'embed' ? '' : 'none';
      document.getElementById('add-fields-text').style.display = type === 'text' ? '' : 'none';
      document.getElementById('add-fields-image').style.display = type === 'image' ? '' : 'none';
      document.getElementById('add-fields-video').style.display = type === 'video' ? '' : 'none';
    }

    function handleAddFile(input) {
      const file = input.files[0];
      if (!file) return;
      addPendingFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('add-file-preview').innerHTML = `<img src="${e.target.result}" alt="preview">`;
        const pb = document.getElementById('add-live-preview');
        const pc = document.getElementById('add-preview-content');
        pc.innerHTML = `<img src="${e.target.result}" alt="preview">`;
        pb.style.display = '';
      };
      reader.readAsDataURL(file);
    }
    function handleAddDrop(event) {
      event.preventDefault();
      event.target.closest('.file-upload-area').classList.remove('dragging');
      const file = event.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      addPendingFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('add-file-preview').innerHTML = `<img src="${e.target.result}" alt="preview">`;
        const pb = document.getElementById('add-live-preview');
        const pc = document.getElementById('add-preview-content');
        pc.innerHTML = `<img src="${e.target.result}" alt="preview">`;
        pb.style.display = '';
      };
      reader.readAsDataURL(file);
    }

    let addPendingVideo = null;
    function handleAddVideoFile(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 50 * 1024 * 1024) { toast('Video too large (max 50MB)', true); return; }
      addPendingVideo = file;
      const url = URL.createObjectURL(file);
      document.getElementById('add-video-preview').innerHTML = `<video src="${url}" style="max-width:180px;max-height:120px;border-radius:6px;margin-top:0.5rem" controls></video>`;
    }
    function handleAddVideoDrop(event) {
      event.preventDefault();
      event.target.closest('.file-upload-area').classList.remove('dragging');
      const file = event.dataTransfer.files[0];
      if (!file || !file.type.startsWith('video/')) return;
      if (file.size > 50 * 1024 * 1024) { toast('Video too large (max 50MB)', true); return; }
      addPendingVideo = file;
      const url = URL.createObjectURL(file);
      document.getElementById('add-video-preview').innerHTML = `<video src="${url}" style="max-width:180px;max-height:120px;border-radius:6px;margin-top:0.5rem" controls></video>`;
    }

    function updateAddPreview() {
      const type = document.getElementById('add-type').value;
      const pb = document.getElementById('add-live-preview');
      const pc = document.getElementById('add-preview-content');
      if (type === 'embed') {
        const url = document.getElementById('add-url').value.trim();
        if (url) { pc.innerHTML = getEmbedPreviewHtml(url); pb.style.display = ''; }
        else pb.style.display = 'none';
      } else if (type === 'text') {
        const text = document.getElementById('add-text').value.trim();
        if (text) { pc.innerHTML = `<div class="preview-text">${esc(text)}</div>`; pb.style.display = ''; }
        else pb.style.display = 'none';
      } else pb.style.display = 'none';
    }

    async function saveAddItem() {
      const subId = document.getElementById('add-subcategory').value;
      if (!subId) { toast('Select a subcategory', true); return; }

      const type = document.getElementById('add-type').value;
      const title = document.getElementById('add-title').value.trim();
      let content = '';

      if (type === 'embed') {
        content = document.getElementById('add-url').value.trim();
        if (!content) { toast('URL is required', true); return; }
      } else if (type === 'text') {
        content = document.getElementById('add-text').value.trim();
        if (!content) { toast('Text is required', true); return; }
      } else if (type === 'image') {
        if (!addPendingFile) { toast('Select an image', true); return; }
        try { toast('Uploading...'); content = await uploadImage(addPendingFile); addPendingFile = null; }
        catch (err) { console.error(err); toast('Upload failed', true); return; }
      } else if (type === 'video') {
        if (!addPendingVideo) { toast('Select a video', true); return; }
        try { toast('Uploading video...'); content = await uploadFile(addPendingVideo); addPendingVideo = null; }
        catch (err) { console.error(err); toast('Upload failed', true); return; }
      }

      const items = allItems.filter(i => i.subcategory_id === subId);
      const { data, error } = await db.from('items').insert([{
        subcategory_id: subId, type, title, content, sort_order: items.length
      }]).select();

      if (error) { toast('Error saving', true); console.error(error); return; }

      if (data && data[0]) {
        const tagIds = getSelectedTagIds('add-tag-selector');
        if (tagIds.length > 0) await syncItemTags(data[0].id, tagIds);
      }

      toast('Item added!');
      closeAddModal();
      loadAll();
    }

    // ---- EDIT MODAL ----
    function openEditModal(itemId) {
      const item = allItems.find(i => i.id === itemId);
      if (!item) return;

      document.getElementById('edit-item-id').value = item.id;
      document.getElementById('edit-type').value = item.type;
      document.getElementById('edit-title').value = item.title || '';
      document.getElementById('edit-url').value = '';
      document.getElementById('edit-text').value = '';
      document.getElementById('edit-file-preview').innerHTML = '';
      document.getElementById('edit-video-preview').innerHTML = '';
      editPendingFile = null;
      editPendingVideo = null;

      if (item.type === 'embed') document.getElementById('edit-url').value = item.content || '';
      else if (item.type === 'text') document.getElementById('edit-text').value = item.content || '';
      else if (item.type === 'image' && item.content)
        document.getElementById('edit-file-preview').innerHTML = `<img src="${esc(item.content)}" alt="current">`;
      else if (item.type === 'video' && item.content)
        document.getElementById('edit-video-preview').innerHTML = `<video src="${esc(item.content)}" style="max-width:180px;max-height:120px;border-radius:6px;margin-top:0.5rem" controls></video>`;

      toggleEditFields();
      updateEditPreview();

      const currentTagIds = allItemTags.filter(it => it.item_id === itemId).map(it => it.tag_id);
      renderTagSelector('edit-tag-selector', currentTagIds);

      document.getElementById('editModal').classList.add('open');
    }
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('open');
      editPendingFile = null;
    }

    function toggleEditFields() {
      const type = document.getElementById('edit-type').value;
      document.getElementById('edit-fields-embed').style.display = type === 'embed' ? '' : 'none';
      document.getElementById('edit-fields-text').style.display = type === 'text' ? '' : 'none';
      document.getElementById('edit-fields-image').style.display = type === 'image' ? '' : 'none';
      document.getElementById('edit-fields-video').style.display = type === 'video' ? '' : 'none';
    }

    function handleEditFile(input) {
      const file = input.files[0];
      if (!file) return;
      editPendingFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('edit-file-preview').innerHTML = `<img src="${e.target.result}" alt="preview">`;
      };
      reader.readAsDataURL(file);
    }
    function handleEditDrop(event) {
      event.preventDefault();
      event.target.closest('.file-upload-area').classList.remove('dragging');
      const file = event.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      editPendingFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('edit-file-preview').innerHTML = `<img src="${e.target.result}" alt="preview">`;
      };
      reader.readAsDataURL(file);
    }

    let editPendingVideo = null;
    function handleEditVideoFile(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 50 * 1024 * 1024) { toast('Video too large (max 50MB)', true); return; }
      editPendingVideo = file;
      const url = URL.createObjectURL(file);
      document.getElementById('edit-video-preview').innerHTML = `<video src="${url}" style="max-width:180px;max-height:120px;border-radius:6px;margin-top:0.5rem" controls></video>`;
    }
    function handleEditVideoDrop(event) {
      event.preventDefault();
      event.target.closest('.file-upload-area').classList.remove('dragging');
      const file = event.dataTransfer.files[0];
      if (!file || !file.type.startsWith('video/')) return;
      if (file.size > 50 * 1024 * 1024) { toast('Video too large (max 50MB)', true); return; }
      editPendingVideo = file;
      const url = URL.createObjectURL(file);
      document.getElementById('edit-video-preview').innerHTML = `<video src="${url}" style="max-width:180px;max-height:120px;border-radius:6px;margin-top:0.5rem" controls></video>`;
    }

    function updateEditPreview() {
      const type = document.getElementById('edit-type').value;
      const pb = document.getElementById('edit-live-preview');
      const pc = document.getElementById('edit-preview-content');
      if (type === 'embed') {
        const url = document.getElementById('edit-url').value.trim();
        if (url) { pc.innerHTML = getEmbedPreviewHtml(url); pb.style.display = ''; }
        else pb.style.display = 'none';
      } else if (type === 'text') {
        const text = document.getElementById('edit-text').value.trim();
        if (text) { pc.innerHTML = `<div class="preview-text">${esc(text)}</div>`; pb.style.display = ''; }
        else pb.style.display = 'none';
      } else pb.style.display = 'none';
    }

    async function saveEditItem() {
      const id = document.getElementById('edit-item-id').value;
      const type = document.getElementById('edit-type').value;
      const title = document.getElementById('edit-title').value.trim();
      let content = '';

      if (type === 'embed') {
        content = document.getElementById('edit-url').value.trim();
        if (!content) { toast('URL is required', true); return; }
      } else if (type === 'text') {
        content = document.getElementById('edit-text').value.trim();
        if (!content) { toast('Text is required', true); return; }
      } else if (type === 'image') {
        if (editPendingFile) {
          try { toast('Uploading...'); content = await uploadImage(editPendingFile); editPendingFile = null; }
          catch (err) { console.error(err); toast('Upload failed', true); return; }
        } else {
          const existing = allItems.find(i => i.id === id);
          content = existing?.content || '';
          if (!content) { toast('Select an image', true); return; }
        }
      } else if (type === 'video') {
        if (editPendingVideo) {
          try { toast('Uploading video...'); content = await uploadFile(editPendingVideo); editPendingVideo = null; }
          catch (err) { console.error(err); toast('Upload failed', true); return; }
        } else {
          const existing = allItems.find(i => i.id === id);
          content = existing?.content || '';
          if (!content) { toast('Select a video', true); return; }
        }
      }

      const { error } = await db.from('items').update({ type, title, content }).eq('id', id);
      if (error) { toast('Error saving', true); console.error(error); return; }

      const tagIds = getSelectedTagIds('edit-tag-selector');
      await syncItemTags(id, tagIds);

      toast('Item updated!');
      closeEditModal();
      loadAll();
    }

    // ---- CATEGORY / SUBCATEGORY CRUD ----
    async function updateCategory(id, title) {
      await db.from('categories').update({ title }).eq('id', id);
      const cat = allCategories.find(c => c.id === id);
      if (cat) cat.title = title;
      toast('Saved');
    }

    async function deleteCategory(id) {
      if (!confirm('Delete this category and all its content?')) return;
      const subs = allSubcategories.filter(s => s.category_id === id);
      for (const sub of subs) {
        await db.from('item_tags').delete().in('item_id', allItems.filter(i => i.subcategory_id === sub.id).map(i => i.id));
        await db.from('items').delete().eq('subcategory_id', sub.id);
      }
      await db.from('subcategories').delete().eq('category_id', id);
      await db.from('categories').delete().eq('id', id);
      toast('Deleted');
      loadAll();
    }

    async function updateSubcategory(id, title) {
      await db.from('subcategories').update({ title }).eq('id', id);
      const sub = allSubcategories.find(s => s.id === id);
      if (sub) sub.title = title;
      toast('Saved');
    }

    async function deleteSubcategory(id) {
      if (!confirm('Delete this subcategory and all its items?')) return;
      await db.from('item_tags').delete().in('item_id', allItems.filter(i => i.subcategory_id === id).map(i => i.id));
      await db.from('items').delete().eq('subcategory_id', id);
      await db.from('subcategories').delete().eq('id', id);
      toast('Deleted');
      loadAll();
    }

    function promptAddSubcategory(catId) {
      const name = prompt('Subcategory name:');
      if (!name || !name.trim()) return;
      addSubcategoryDirect(catId, name.trim());
    }

    async function addSubcategoryDirect(catId, title) {
      const subs = allSubcategories.filter(s => s.category_id === catId);
      const { error } = await db.from('subcategories').insert([{ category_id: catId, title, sort_order: subs.length }]);
      if (error) { toast('Error', true); return; }
      toast('Subcategory added');
      loadAll();
    }

    // ---- ITEM DELETE ----
    async function deleteItem(id) {
      if (!confirm('Delete this item?')) return;
      await db.from('item_tags').delete().eq('item_id', id);
      await db.from('items').delete().eq('id', id);
      toast('Deleted');
      loadAll();
    }

    // ---- TAGS ----
    function getItemTags(itemId) {
      const tagIds = allItemTags.filter(it => it.item_id === itemId).map(it => it.tag_id);
      return allTags.filter(t => tagIds.includes(t.id));
    }

    function renderTagSelector(containerId, selectedTagIds = []) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (allTags.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.75rem">No tags — add in Settings</span>';
        return;
      }
      container.innerHTML = allTags.map(tag => `
        <span class="tag-option ${selectedTagIds.includes(tag.id) ? 'selected' : ''}"
          style="background:${esc(tag.color)}22;color:${esc(tag.color)}"
          data-tag-id="${tag.id}"
          onclick="this.classList.toggle('selected')">
          ${esc(tag.name)}
        </span>
      `).join('');
    }

    function getSelectedTagIds(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return [];
      return Array.from(container.querySelectorAll('.tag-option.selected')).map(el => el.dataset.tagId);
    }

    async function syncItemTags(itemId, tagIds) {
      await db.from('item_tags').delete().eq('item_id', itemId);
      if (tagIds.length > 0) {
        const rows = tagIds.map(tagId => ({ item_id: itemId, tag_id: tagId }));
        await db.from('item_tags').insert(rows);
      }
    }

    // ---- SETTINGS ----
    function openSettings() {
      renderSettingsTags();
      document.getElementById('settingsModal').classList.add('open');
    }
    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
      loadAll();
    }

    function renderSettingsTags() {
      const container = document.getElementById('settingsTagsList');
      if (allTags.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">No tags yet</span>';
        return;
      }
      container.innerHTML = allTags.map(tag => `
        <span class="tag-pill" style="background:${esc(tag.color)}22;color:${esc(tag.color)}">
          ${esc(tag.name)}
          <span class="tag-x" onclick="deleteTag('${tag.id}')">&#10005;</span>
        </span>
      `).join('');
    }

    async function addTag() {
      const name = document.getElementById('newTagName').value.trim();
      const color = document.getElementById('newTagColor').value;
      if (!name) { toast('Enter a tag name', true); return; }
      const { error } = await db.from('tags').insert([{ name, color }]);
      if (error) {
        if (error.code === '23505') toast('Tag already exists', true);
        else { toast('Error', true); console.error(error); }
        return;
      }
      document.getElementById('newTagName').value = '';
      toast('Tag added');
      await loadAll();
      renderSettingsTags();
    }

    async function deleteTag(id) {
      if (!confirm('Delete this tag?')) return;
      await db.from('item_tags').delete().eq('tag_id', id);
      await db.from('tags').delete().eq('id', id);
      toast('Tag deleted');
      await loadAll();
      renderSettingsTags();
    }

    // ---- FILE UPLOAD ----
    async function uploadImage(file) {
      const ext = file.name.split('.').pop();
      const name = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { data, error } = await db.storage.from('images').upload(name, file);
      if (error) throw error;
      const { data: urlData } = db.storage.from('images').getPublicUrl(name);
      return urlData.publicUrl;
    }

    async function uploadFile(file) {
      const ext = file.name.split('.').pop();
      const name = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { data, error } = await db.storage.from('images').upload(name, file, {
        contentType: file.type
      });
      if (error) throw error;
      const { data: urlData } = db.storage.from('images').getPublicUrl(name);
      return urlData.publicUrl;
    }

    // ---- EMBED HELPERS ----
    function getEmbedHtml(url) {
      if (!url) return '';
      if (url.includes('instagram.com')) {
        const match = url.match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
        if (match) return `<iframe src="https://www.instagram.com/${match[1]}/${match[2]}/embed/captioned/" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let vid = '';
        if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split(/[?&#]/)[0];
        else if (url.includes('/shorts/')) vid = url.split('/shorts/')[1]?.split(/[?&#]/)[0];
        else { const m = url.match(/[?&]v=([A-Za-z0-9_-]+)/); vid = m?.[1]; }
        if (vid) return `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('tiktok.com')) {
        const match = url.match(/\/video\/(\d+)/);
        if (match) return `<iframe src="https://www.tiktok.com/embed/v2/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('vimeo.com')) {
        const match = url.match(/vimeo\.com\/(\d+)/);
        if (match) return `<iframe src="https://player.vimeo.com/video/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('x.com') || url.includes('twitter.com')) {
        const match = url.match(/(?:x\.com|twitter\.com)\/([^/]+)\/status\/(\d+)/);
        if (match) return `<div class="x-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#15202b;gap:0.5rem;padding:1rem;">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span style="color:#8899a6;font-size:0.7rem;">@${esc(match[1])}</span></div>`;
      }
      if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/([A-Za-z0-9_-]+)/);
        if (match) return `<iframe src="https://drive.google.com/file/d/${match[1]}/preview" allow="autoplay" allowfullscreen loading="lazy"></iframe>`;
      }
      return `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:0.8rem;padding:1rem;text-align:center;word-break:break-all;">${esc(url)}</div>`;
    }

    function getEmbedPreviewHtml(url) {
      if (!url) return '';
      if (url.includes('instagram.com')) {
        const match = url.match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
        if (match) return `<iframe src="https://www.instagram.com/${match[1]}/${match[2]}/embed/captioned/" allowfullscreen loading="lazy" style="background:#000"></iframe>`;
      }
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let vid = '';
        if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split(/[?&#]/)[0];
        else if (url.includes('/shorts/')) vid = url.split('/shorts/')[1]?.split(/[?&#]/)[0];
        else { const m = url.match(/[?&]v=([A-Za-z0-9_-]+)/); vid = m?.[1]; }
        if (vid) return `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('tiktok.com')) {
        const match = url.match(/\/video\/(\d+)/);
        if (match) return `<iframe src="https://www.tiktok.com/embed/v2/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('vimeo.com')) {
        const match = url.match(/vimeo\.com\/(\d+)/);
        if (match) return `<iframe src="https://player.vimeo.com/video/${match[1]}" allowfullscreen loading="lazy"></iframe>`;
      }
      if (url.includes('x.com') || url.includes('twitter.com')) {
        const match = url.match(/(?:x\.com|twitter\.com)\/([^/]+)\/status\/(\d+)/);
        if (match) return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:1.2rem;background:#15202b;min-height:300px;">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span style="color:#8899a6;font-size:0.95rem;">@${esc(match[1])}</span>
          <a href="${esc(url)}" target="_blank" rel="noopener" style="background:var(--accent);color:#fff;padding:0.6rem 1.5rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:0.9rem;">View on X</a></div>`;
      }
      if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/([A-Za-z0-9_-]+)/);
        if (match) return `<iframe src="https://drive.google.com/file/d/${match[1]}/preview" allow="autoplay" allowfullscreen loading="lazy"></iframe>`;
      }
      return `<div style="padding:1rem;text-align:center;color:var(--text-muted)"><a href="${esc(url)}" target="_blank" style="color:var(--accent);text-decoration:none">${esc(url)}</a></div>`;
    }

    function isLandscapeEmbed(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com');
    }

    // ---- LIGHTBOX ----
    function openLightbox(itemId) {
      if (editMode) return;
      const item = allItems.find(i => i.id === itemId);
      if (!item) return;

      currentLightboxItemId = item.id;

      const media = document.getElementById('lightboxMedia');
      const info = document.getElementById('lightboxInfo');
      const itemTags = getItemTags(item.id);

      if (item.type === 'embed') {
        const isX = item.content && (item.content.includes('x.com') || item.content.includes('twitter.com'));
        const landscape = isLandscapeEmbed(item.content);
        media.className = 'lightbox-media' + (landscape ? ' landscape' : '');
        media.innerHTML = isX ? getEmbedPreviewHtml(item.content) : getEmbedHtml(item.content).replace(/pointer-events:\s*none/g, '');
      } else if (item.type === 'text') {
        media.className = 'lightbox-media';
        media.innerHTML = `<div class="lightbox-text">${esc(item.content || '')}</div>`;
      } else if (item.type === 'image') {
        media.className = 'lightbox-media';
        media.innerHTML = `<img src="${esc(item.content || '')}" alt="">`;
      } else if (item.type === 'video') {
        media.className = 'lightbox-media';
        media.innerHTML = `<video src="${esc(item.content || '')}" controls autoplay style="width:100%;max-height:70vh;background:#000"></video>`;
      }

      let infoHtml = '';
      if (item.title) infoHtml += `<div class="lightbox-title">${esc(item.title)}</div>`;
      if (itemTags.length > 0) {
        infoHtml += `<div class="lightbox-tags">${itemTags.map(t =>
          `<span class="lb-tag" style="background:${esc(t.color)}33;color:${esc(t.color)}">${esc(t.name)}</span>`
        ).join('')}</div>`;
      }
      info.innerHTML = infoHtml;
      info.style.display = infoHtml ? '' : 'none';

      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightboxMedia').innerHTML = '';
      currentLightboxItemId = null;
    }

    function editFromLightbox() {
      const itemId = currentLightboxItemId;
      if (!itemId) return;
      closeLightbox();
      openEditModal(itemId);
    }

    // ---- UTILS ----
    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function toast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    // ---- MODAL CLOSE HANDLERS ----
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('addModal')) closeAddModal();
    });
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEditModal();
    });
    document.getElementById('settingsModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('settingsModal')) closeSettings();
    });
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeLightbox();
        closeAddModal();
        closeEditModal();
        closeSettings();
      }
    });
  </script>
</body>
</html>
